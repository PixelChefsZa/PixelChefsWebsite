function dayKey(y,m,d){ return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
function getDaysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function getFirstDay(y,m){ return new Date(y,m,1).getDay(); }
function hexToRgb(hex){ return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`; }
function fmtTime(s){ const m=Math.floor(s/60),sec=s%60; return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`; }
function loadData(){ try{ return JSON.parse(localStorage.getItem("dw_v5")||"{}"); }catch{ return {}; } }
function saveData(d){ try{ localStorage.setItem("dw_v5",JSON.stringify(d)); }catch{} }
function clearData(){ try{ localStorage.removeItem("dw_v5"); }catch{} }
function getRank(pts){ return RANKS.find(r=>pts>=r.min&&pts<=r.max)||RANKS[0]; }
function getDragonPoints(data){ return Object.values(data).filter(e=>PILLARS.every(p=>e[p.key])).length; }
function getDragonPointStreak(data,todayKey){
  let streak=0; const d=new Date(todayKey);
  while(streak<=365){
    const k=dayKey(d.getFullYear(),d.getMonth(),d.getDate());
    const e=data[k]||{};
    if(!PILLARS.every(p=>e[p.key])&&k!==todayKey) break;
    if(PILLARS.every(p=>e[p.key])) streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function getTotalDays(data){ return Object.values(data).filter(e=>PILLARS.some(p=>e[p.key])).length; }
function getFullDays(data){ return Object.values(data).filter(e=>PILLARS.every(p=>e[p.key])).length; }
function getPillarDays(data,key){ return Object.values(data).filter(e=>e[key]).length; }
function getPracticeCounts(data,pillarKey){
  const counts={};
  Object.values(data).forEach(entry=>{ const ps=entry[`${pillarKey}_practices`]||[]; ps.forEach(p=>{ counts[p]=(counts[p]||0)+1; }); });
  return counts;
}
function getAllPracticeCounts(data){
  const counts={};
  PILLARS.forEach(pillar=>{ pillar.practices.forEach(practice=>{ let vol=0; Object.values(data).forEach(entry=>{ const ps=entry[`${pillar.key}_practices`]||[]; if(ps.includes(practice.label)) vol++; }); counts[practice.key]={volume:vol,pillar,practice}; }); });
  return counts;
}
function getPracticeStreak(data,pillarKey,practiceLabel,todayKey){
  let streak=0; const d=new Date(todayKey);
  while(streak<=365){
    const k=dayKey(d.getFullYear(),d.getMonth(),d.getDate());
    const ps=(data[k]||{})[`${pillarKey}_practices`]||[];
    if(!ps.includes(practiceLabel)&&k!==todayKey) break;
    if(ps.includes(practiceLabel)) streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function getBestStreak(data){
  const keys=Object.keys(data).filter(k=>PILLARS.some(p=>data[k][p.key])).sort();
  let best=0,cur=0,prev=null;
  for(const k of keys){ if(prev){ const diff=(new Date(k)-new Date(prev))/86400000; cur=diff===1?cur+1:1; } else cur=1; if(cur>best) best=cur; prev=k; }
  return best;
}
function getUnlockedBadges(data,todayKey){
  const unlocked=new Set();
  const pCounts=getAllPracticeCounts(data);
  PILLARS.forEach(pillar=>{ pillar.practices.forEach(practice=>{ const vol=pCounts[practice.key]?.volume||0; const streak=getPracticeStreak(data,pillar.key,practice.label,todayKey); (BADGES[practice.key]||[]).forEach(badge=>{ if(badge.type==="volume"&&vol>=badge.req) unlocked.add(badge.id); if(badge.type==="streak"&&streak>=badge.req) unlocked.add(badge.id); }); }); });
  return unlocked;
}

        <button onClick={()=>toggle("General")} style={{background:selected.has("General")?pillar.dim:"rgba(255,255,255,0.02)",border:`1px solid ${selected.has("General")?pillar.color:"rgba(255,255,255,0.1)"}`,borderRadius:12,padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:selected.has("General")?`0 0 14px ${pillar.glow}`:"none",transition:"all 0.2s"}}>

function FocusOverlay({data,setData,today,todayKey,onClose}){
  const [phase,setPhase]=useState("idle");
  const [timeLeft,setTimeLeft]=useState(WORK_DURATION);
  const [selectedPillar,setSelectedPillar]=useState(null);
  const [selectedPractice,setSelectedPractice]=useState(null);
  const [sessionLogged,setSessionLogged]=useState(false);
  const intervalRef=useRef(null);
  const totalRef=useRef(WORK_DURATION);

  useEffect(()=>{
    if(phase==="work"||phase==="rest"){
      intervalRef.current=setInterval(()=>{
        setTimeLeft(t=>{
          if(t<=1){
            clearInterval(intervalRef.current);
            if(phase==="work"){ logSession(); setPhase("rest"); setTimeLeft(REST_DURATION); totalRef.current=REST_DURATION; }
            else setPhase("done");
            return 0;
          }
          return t-1;
        });
      },1000);
    }
    return ()=>clearInterval(intervalRef.current);
  },[phase]);

  function logSession(){
    if(!selectedPillar) return;
    setData(prev=>{
      const entry={...(prev[todayKey]||{})};
      entry[selectedPillar]=true;
      if(selectedPractice){ const ex=entry[`${selectedPillar}_practices`]||[]; if(!ex.includes(selectedPractice)) entry[`${selectedPillar}_practices`]=[...ex,selectedPractice]; }
      return {...prev,[todayKey]:entry};
    });
    setSessionLogged(true);
  }
  function startSession(){ if(!selectedPillar) return; setPhase("work"); setTimeLeft(WORK_DURATION); totalRef.current=WORK_DURATION; setSessionLogged(false); }
  function markDone(){ clearInterval(intervalRef.current); logSession(); setPhase("rest"); setTimeLeft(REST_DURATION); totalRef.current=REST_DURATION; }
  function reset(){ clearInterval(intervalRef.current); setPhase("idle"); setTimeLeft(WORK_DURATION); setSessionLogged(false); setSelectedPillar(null); setSelectedPractice(null); }

  const progress=phase==="idle"?0:1-(timeLeft/totalRef.current);
  const radius=90,circ=2*Math.PI*radius,dash=circ*(1-progress);
  const activePillar=PILLARS.find(p=>p.key===selectedPillar);
  const phaseColor=phase==="rest"?"#5B8FD4":phase==="done"?"#C8A96E":activePillar?.color||"#C8A96E";

  return (
    <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(8,10,14,0.97)",backdropFilter:"blur(8px)",overflowY:"auto",paddingTop:"env(safe-area-inset-top)",paddingBottom:"env(safe-area-inset-bottom)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"48px 24px 20px"}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.35em",color:"#C8A96E",opacity:0.7,marginBottom:4,textTransform:"uppercase"}}>Ultradian</div>
          <h2 style={{fontFamily:"'Cinzel',serif",fontSize:22,fontWeight:700,color:"#C8A96E",letterSpacing:"0.06em"}}>Focus Session</h2>
        </div>
        <button onClick={onClose} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 14px",cursor:"pointer",color:"#9A8E77",fontSize:11,fontFamily:"'Cinzel',serif",letterSpacing:"0.1em"}}>Close</button>
      </div>
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 24px"}}>
        {phase==="idle"&&(
          <div style={{marginBottom:24}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:"#6B6255",textTransform:"uppercase",textAlign:"center",marginBottom:10}}>Training for</div>
            <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginBottom:16}}>
              {PILLARS.map(p=>{ const isSel=selectedPillar===p.key; return <button key={p.key} onClick={()=>{setSelectedPillar(p.key);setSelectedPractice(null);}} style={{background:isSel?p.dim:"rgba(255,255,255,0.03)",border:`1px solid ${isSel?p.color:"rgba(255,255,255,0.1)"}`,borderRadius:100,padding:"8px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s",boxShadow:isSel?`0 0 12px ${p.glow}`:"none"}}><span style={{fontSize:13}}>{p.icon}</span><span style={{fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.1em",color:isSel?p.color:"#9A8E77",textTransform:"uppercase"}}>{p.label}</span></button>; })}
            </div>
            {selectedPillar&&(
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:14}}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.2em",color:"#6B6255",textTransform:"uppercase",marginBottom:10}}>Practice (optional)</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  <button onClick={()=>setSelectedPractice(null)} style={{background:!selectedPractice?`rgba(${hexToRgb(activePillar.color)},0.1)`:"rgba(255,255,255,0.02)",border:`1px solid ${!selectedPractice?activePillar.color:"rgba(255,255,255,0.08)"}`,borderRadius:100,padding:"6px 12px",cursor:"pointer",fontSize:10,color:!selectedPractice?activePillar.color:"#6B6255"}}>General</button>
                  {activePillar?.practices.map(p=><button key={p.key} onClick={()=>setSelectedPractice(p.label)} style={{background:selectedPractice===p.label?`rgba(${hexToRgb(activePillar.color)},0.1)`:"rgba(255,255,255,0.02)",border:`1px solid ${selectedPractice===p.label?activePillar.color:"rgba(255,255,255,0.08)"}`,borderRadius:100,padding:"6px 12px",cursor:"pointer",fontSize:10,color:selectedPractice===p.label?activePillar.color:"#6B6255"}}>{p.icon} {p.label}</button>)}
                </div>
              </div>
            )}
          </div>
        )}
        <div style={{display:"flex",justifyContent:"center",marginBottom:24}}>

function HomeTab({data,setData,today,todayKey,streak,dragonPoints,dpStreak,onShowCreed,onShowStats,onShowFocus}){
  const [viewYear,setViewYear]=useState(today.getFullYear());
  const [viewMonth,setViewMonth]=useState(today.getMonth());
  const [selected,setSelected]=useState(null);
  const [practicePanel,setPracticePanel]=useState(null);
  const [flash,setFlash]=useState(null);
  const oath=OATHS[today.getDay()%OATHS.length];
  const rank=getRank(dragonPoints);
  const rankIdx=RANKS.indexOf(rank);
  const nextRank=RANKS[rankIdx+1];
  const rankProgress=nextRank?(dragonPoints-rank.min)/(nextRank.min-rank.min):1;

  useEffect(()=>{ if(flash){ const t=setTimeout(()=>setFlash(null),1400); return ()=>clearTimeout(t); } },[flash]);

  function handlePillarTap(pillarKey,year,month,day){
    const pillar=PILLARS.find(p=>p.key===pillarKey);
    const k=dayKey(year,month,day);
    const existing=(data[k]||{})[`${pillarKey}_practices`]||[];
    setPracticePanel({pillar,year,month,day,existing});
  }

  function savePractices(year,month,day,pillarKey,practices){
    const k=dayKey(year,month,day);
    setData(prev=>{
      const entry={...(prev[k]||{})};
      if(practices.length>0){ entry[pillarKey]=true; entry[`${pillarKey}_practices`]=practices; }
      else{ entry[pillarKey]=false; delete entry[`${pillarKey}_practices`]; }
      const next={...prev,[k]:entry};
      if(PILLARS.every(p=>next[k][p.key])) setFlash(k);
      return next;
    });
    setPracticePanel(null);
  }

  const daysInMonth=getDaysInMonth(viewYear,viewMonth);
  const firstDay=getFirstDay(viewYear,viewMonth);
  const todayEntry=data[todayKey]||{};
  const todayDone=PILLARS.filter(p=>todayEntry[p.key]).length;

    <>

          <div style={{fontSize:44,marginBottom:8,filter:"drop-shadow(0 0 20px #C8A96E)"}}>{rank.icon}</div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.35em",color:"#C8A96E",opacity:0.6,marginBottom:4,textTransform:"uppercase"}}>You are</div>
          <h1 style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(22px,6vw,34px)",fontWeight:700,color:"#C8A96E",margin:"0 0 6px",letterSpacing:"0.06em"}}>{rank.title}</h1>
          <p style={{fontSize:12,color:"#9A8E77",fontStyle:"italic",marginBottom:14,lineHeight:1.6}}>{rank.desc}</p>
          {nextRank&&<div style={{maxWidth:200,margin:"0 auto 14px"}}><div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${rankProgress*100}%`,background:"linear-gradient(90deg,#C8A96E,#E8B84B)",borderRadius:2,boxShadow:"0 0 8px rgba(200,169,110,0.4)"}}/></div><div style={{fontSize:8,color:"#6B6255",textAlign:"center",marginTop:4}}>{nextRank.min-dragonPoints} Dragon Points to {nextRank.title}</div></div>}
          <div style={{width:48,height:1,background:"linear-gradient(90deg,transparent,#C8A96E,transparent)",margin:"0 auto 12px"}}/>
          <p style={{fontFamily:"'Cinzel',serif",fontSize:11,color:"#9A8E77",fontStyle:"italic",letterSpacing:"0.03em",maxWidth:300,margin:"0 auto",lineHeight:1.7}}>"{oath}"</p>

              <span style={{fontSize:12}}>{p.icon}</span>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:"0.1em",color:done?p.color:"#9A8E77",textTransform:"uppercase"}}>{p.label}</span>
              {done&&<span style={{fontSize:8,color:p.color,opacity:0.8}}>{practices.length>0?`${practices.length}`:"✓"}</span>}
            </button>
          ); })}
        </div>

        <div style={{display:"flex",justifyContent:"center",padding:"0 24px 24px"}}>
          <button onClick={onShowFocus} style={{background:"rgba(200,169,110,0.06)",border:"1px solid rgba(200,169,110,0.2)",borderRadius:12,padding:"12px 28px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>⏱</span>

function DragonWarrior(){
  const [tab,setTab]=useState("home");
  const [data,setData]=useState(loadData);
  const [showCreed,setShowCreed]=useState(false);
  const [showStats,setShowStats]=useState(false);
  const [showFocus,setShowFocus]=useState(false);
  const today=new Date();
  const todayKey=dayKey(today.getFullYear(),today.getMonth(),today.getDate());

  useEffect(()=>{ saveData(data); },[data]);

  function getStreak(){
    let streak=0; const d=new Date(today);
    while(streak<=365){
      const k=dayKey(d.getFullYear(),d.getMonth(),d.getDate());
      const entry=data[k]||{};
      const count=PILLARS.filter(p=>entry[p.key]).length;
      if(count===0&&k!==todayKey) break;
      if(count>0) streak++;
      d.setDate(d.getDate()-1);
    }
    return streak;
  }

  const streak=getStreak();
  const dragonPoints=getDragonPoints(data);
  const dpStreak=getDragonPointStreak(data,todayKey);

  return (
    <div style={{minHeight:"100vh",background:"#0D0F14",backgroundImage:SCALE_BG,fontFamily:"'Inter',system-ui,sans-serif",color:"#D4C9B0"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');
        * { box-sizing:border-box; margin:0; padding:0; }
        button { font-family:inherit; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(200,169,110,0.2); border-radius:2px; }
      `}</style>

      {showCreed&&<CreedScreen onClose={()=>setShowCreed(false)}/>}
      {showStats&&<StatsModal data={data} streak={streak} dragonPoints={dragonPoints} dpStreak={dpStreak} onClose={()=>setShowStats(false)} onReset={()=>setData({})}/>}
      {showFocus&&<FocusOverlay data={data} setData={setData} today={today} todayKey={todayKey} onClose={()=>setShowFocus(false)}/>}

      {tab==="home"   &&<HomeTab data={data} setData={setData} today={today} todayKey={todayKey} streak={streak} dragonPoints={dragonPoints} dpStreak={dpStreak} onShowCreed={()=>setShowCreed(true)} onShowStats={()=>setShowStats(true)} onShowFocus={()=>setShowFocus(true)}/>}
      {tab==="body"   &&<ElementTab pillar={PILLARS[0]}/>}
      {tab==="mind"   &&<ElementTab pillar={PILLARS[1]}/>}
      {tab==="craft"  &&<ElementTab pillar={PILLARS[2]}/>}
      {tab==="energy" &&<ElementTab pillar={PILLARS[3]}/>}
      {tab==="badges" &&<BadgesPage data={data} dragonPoints={dragonPoints} todayKey={todayKey}/>}

      <TabBar active={tab} onSelect={setTab}/>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(DragonWarrior));
  </script>
</body>
</html>
